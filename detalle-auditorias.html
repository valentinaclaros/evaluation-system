<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Auditorías - Sistema de Evaluación</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .agent-card {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1rem;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .agent-card:hover {
            box-shadow: var(--shadow-md);
        }
        
        .agent-header {
            padding: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }
        
        .agent-header:hover {
            opacity: 0.95;
        }
        
        .agent-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        
        .agent-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0;
            margin-right: 1rem;
        }
        
        .agent-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            opacity: 0.95;
            align-items: center;
        }
        
        .agent-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .agent-stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .agent-stat-value {
            font-size: 1rem;
            font-weight: 700;
        }
        
        .expand-icon {
            font-size: 1.5rem;
            transition: transform 0.3s ease;
        }
        
        .expand-icon.expanded {
            transform: rotate(180deg);
        }
        
        .agent-audits {
            display: none;
            padding: 1.5rem;
            background: var(--bg-secondary);
        }
        
        .agent-audits.expanded {
            display: block;
        }
        
        .audit-item {
            background: var(--bg-primary);
            border-radius: var(--border-radius-sm);
            padding: 1.25rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        
        .audit-item:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .audit-header-info {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .audit-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .audit-badges {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        
        .audit-badge-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.35rem;
        }
        
        .audit-badge-category {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #374151;
            background: #f3f4f6;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        
        .audit-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .audit-detail-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .audit-detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .audit-detail-value {
            font-size: 0.95rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .audit-errors {
            background: var(--bg-tertiary);
            padding: 1rem;
            border-radius: var(--border-radius-sm);
            border-left: 4px solid var(--error-color);
        }
        
        .audit-errors-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .audit-errors-list {
            list-style: none;
            padding-left: 0;
        }
        
        .audit-errors-list li {
            padding: 0.25rem 0;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .audit-errors-list li:before {
            content: "• ";
            color: var(--error-color);
            font-weight: bold;
            margin-right: 0.5rem;
        }
        
        .audit-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .no-audits {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            font-size: 1.1rem;
        }
        
        .filter-section {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        
        .filter-row {
            display: flex;
            gap: 1rem;
            align-items: end;
            flex-wrap: wrap;
        }
        
        .filter-group {
            flex: 1;
            min-width: 200px;
        }
        
        .filter-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        
        .filter-group input,
        .filter-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-family: inherit;
        }
        
        /* Selección múltiple */
        .bulk-actions-bar {
            display: none;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            box-shadow: var(--shadow-md);
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            animation: slideDown 0.3s ease;
        }
        
        .bulk-actions-bar.active {
            display: flex;
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .bulk-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .bulk-count {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .bulk-buttons {
            display: flex;
            gap: 0.75rem;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        
        .checkbox-wrapper label {
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }
        
        .audit-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        
        .audit-item.selected {
            border: 2px solid var(--primary-color);
            background: rgba(102, 126, 234, 0.05);
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .agent-stats {
                gap: 1rem;
            }
            
            .agent-stat {
                font-size: 0.85rem;
            }
            
            .agent-name {
                font-size: 1.1rem;
            }
        }

        /* Agents bubbles (Todo list style) */
        .agents-bubbles-section {
            margin-bottom: 2rem;
        }
        .agents-bubbles-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .agents-bubbles-arrow-btn {
            background: none;
            border: none;
            color: #374151;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
            transition: transform 0.2s ease;
        }
        .agents-bubbles-arrow-btn.expanded {
            transform: rotate(90deg);
        }
        .agents-bubbles-section.collapsed .agents-bubbles-row {
            display: none;
        }
        .agents-bubbles-title {
            font-size: 1rem;
            font-weight: 700;
            color: #374151;
            margin: 0;
        }
        .agents-bubbles-row {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 480px;
        }
        .agents-bubble {
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            position: relative;
            min-height: 140px;
        }
        .agents-bubble-blue {
            background: #dbeafe;
            color: #1e40af;
        }
        .agents-bubble-purple {
            background: #ede9fe;
            color: #5b21b6;
        }
        .agents-bubble-options {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: inherit;
            opacity: 0.7;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.25rem;
        }
        .agents-bubble-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 1rem 0;
            padding-right: 1.5rem;
        }
        .agents-bubble-blue .agents-bubble-title { color: #1e3a8a; }
        .agents-bubble-purple .agents-bubble-title { color: #4c1d95; }
        .agents-bubble-progress-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .agents-bubble-progress-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .agents-bubble-dots {
            display: flex;
            gap: 4px;
        }
        .agents-bubble-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .agents-bubble-blue .agents-bubble-dot.filled { background: #1e40af; }
        .agents-bubble-blue .agents-bubble-dot.empty { background: #93c5fd; }
        .agents-bubble-purple .agents-bubble-dot.filled { background: #5b21b6; }
        .agents-bubble-purple .agents-bubble-dot.empty { background: #c4b5fd; }
        .agents-bubble-progress-value {
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: auto;
        }
    </style>
</head>
