    <script src="supabase-config.js"></script>
    <script>
        (async function() {
            try {
                var supabase = window.supabase.createClient(
                    'https://fbudeufxxsrwhnmontcj.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZidWRldWZ4eHNyd2hubW9udGNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyNzAyOTQsImV4cCI6MjA4NDg0NjI5NH0.7CbZgIpe8f5oUWwcMI2lQqmt2h9DS5iPZmJatMQi5lM'
                );
